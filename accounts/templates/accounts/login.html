{% extends 'accounts/base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Login</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button class="btn btn-primary w-100">
Login
</button>

</form>

<hr>

<p class="text-center">

Don't have an account?

<a href="{% url 'register' %}">

Register

</a>

</p>

</div>

</div>

</div>

</div>

{% endblock %}
